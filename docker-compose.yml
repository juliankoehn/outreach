services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
      POSTGRES_DB: outreach
    ports:
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: outreach
      MINIO_ROOT_PASSWORD: outreach-secret
    # Host ports default to 9000/9001; override per-machine in the gitignored
    # root .env (e.g. MINIO_API_PORT=9010) if those ports are already taken.
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
volumes:
  pgdata:
  miniodata:
