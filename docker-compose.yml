services:
  db:
    image: postgres:17
    environment:
      POSTGRES_USER: outreach
      POSTGRES_PASSWORD: outreach
      POSTGRES_DB: outreach
    ports:
      - "5544:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: outreach
      MINIO_ROOT_PASSWORD: outreach-secret
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - miniodata:/data
volumes:
  pgdata:
  miniodata:
